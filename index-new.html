          <script>
            (function(d, s, id) {

              if (d.getElementById(id)) {return;}
              js = d.createElement(s); js.id = id;

              d.getElementsByTagName("head")[0].appendChild(js);

            // 제목 텍스트 제거 함수
            function removeInstagramTitle() {
              setTimeout(function() {
                const widget = document.querySelector('.embedsocial-hashtag');
                if (widget) {
                  // 모든 텍스트 노드에서 "풍선 장식" 제거
                  const walker = document.createTreeWalker(
                    widget,
                    NodeFilter.SHOW_TEXT,
                    null,
                    false
                  );
                  
                  let node;
                  const nodesToRemove = [];
                  
                  while (node = walker.nextNode()) {
                    if (node.textContent.includes('풍선') || 
                        node.textContent.includes('장식') || 
                        node.textContent.includes('m.moenv')) {
                      nodesToRemove.push(node.parentElement);
                    }
                  }
                  
                  nodesToRemove.forEach(el => {
                    if (el) el.style.display = 'none';
                  });
                }
                
                // 2초 후 다시 시도
                setTimeout(removeInstagramTitle, 2000);
              }, 1000);
            }
            
            // 페이지 로드 후 실행
            document.addEventListener('DOMContentLoaded', removeInstagramTitle);
            window.addEventListener('load', removeInstagramTitle);
          </script>
