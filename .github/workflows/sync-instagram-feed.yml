name: Sync Instagram Feed

on:
  workflow_dispatch:
  # Supabase 함수와 secrets 설정 후 아래 schedule을 켜면 자동 동기화됩니다.
  # schedule:
  #   - cron: "17 */6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Call Supabase Instagram sync function
        env:
          SYNC_URL: ${{ secrets.SUPABASE_INSTAGRAM_SYNC_URL }}
          SYNC_SECRET: ${{ secrets.INSTAGRAM_SYNC_SECRET }}
        run: |
          test -n "$SYNC_URL"
          test -n "$SYNC_SECRET"

          curl -fsS -X POST "$SYNC_URL" \
            -H "content-type: application/json" \
            -H "x-sync-secret: $SYNC_SECRET" \
            --data '{"source":"github-actions"}'
